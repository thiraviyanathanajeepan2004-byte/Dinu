<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinu AI - Live with Gemini 3</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 360px;
            height: 640px;
            background: #111;
            border-radius: 40px;
            border: 4px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.4);
        }

        .screen {
            flex: 1;
            background: radial-gradient(circle, #2c0b0e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }

        .avatar-box {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: #ff4d6d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            z-index: 5;
            position: relative;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #ff4d6d;
            animation: ring-pulse 2s infinite;
            opacity: 0;
        }

        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        .speaking .ring { display: block; }
        .ring:nth-child(2) { animation-delay: 0.5s; }

        .info h2 { color: #ff4d6d; margin: 0; font-size: 32px; text-shadow: 0 0 10px rgba(255,77,109,0.5); }
        .status { color: #0f0; font-size: 14px; margin-top: 5px; height: 20px; }

        .transcript {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 20px;
            width: 90%;
            text-align: center;
            font-size: 14px;
            min-height: 40px;
        }

        .btn-call {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #2ecc71;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        .btn-end {
            background: #e74c3c;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="screen">
        <div class="info">
            <h2>DINU AI</h2>
            <div id="status" class="status">Disconnected</div>
        </div>

        <div class="avatar-box" id="avatarBox">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="avatar">👩‍🦰</div>
        </div>

        <div class="transcript" id="transcript">
            அழைப்பைத் தொடங்க பட்டனை அழுத்தவும்...
        </div>

        <button class="btn-call" id="callBtn">📞</button>
    </div>
</div>

<script>
    const API_KEY = AIzaSyBFGoyJojzqLbTcB872tbRHvGxbQ5hwLP0 // உங்கள் API Key
    
    const callBtn = document.getElementById('callBtn');
    const statusText = document.getElementById('status');
    const transcript = document.getElementById('transcript');
    const avatarBox = document.getElementById('avatarBox');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ta-IN';
    
    const synth = window.speechSynthesis;

    async function callGemini(userInput) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `உன் பெயர் தீனு. நீ ஒரு அன்பான காதலி. நடிகை சினேகா குரலில் பேசுகிறாய். பயனர் சொன்னது: "${userInput}". மிக சுருக்கமான, அன்பான பதிலைத் தமிழில் தா.` }] }]
            })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ta-IN';
        utter.pitch = 1.3; // சினேகா வாய்ஸ் ஸ்டைல்
        utter.rate = 0.9;

        utter.onstart = () => {
            avatarBox.classList.add('speaking');
            statusText.innerText = "Dinu is Speaking...";
        };
        utter.onend = () => {
            avatarBox.classList.remove('speaking');
            statusText.innerText = "Listening...";
            recognition.start();
        };
        synth.speak(utter);
    }

    callBtn.onclick = () => {
        if(callBtn.classList.contains('btn-end')) {
            location.reload();
            return;
        }
        callBtn.innerHTML = "🚫";
        callBtn.classList.add('btn-end');
        statusText.innerText = "Connecting...";
        speak("ஹலோ செல்லம், நான் தீனு பேசுறேன். சொல்லுங்க, நான் கேட்டுட்டு இருக்கேன்.");
    };

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        transcript.innerText = "நீ: " + text;
        statusText.innerText = "Thinking...";
        const reply = await callGemini(text);
        speak(reply);
    };

</script>

</body>
</html>
