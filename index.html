<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>டினு AI</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .phone { width: 340px; height: 600px; background: #111; border-radius: 40px; border: 5px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(255, 77, 109, 0.4); }
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 20px; background: radial-gradient(circle, #2c0b0e 0%, #000 100%); }
        .avatar-box { width: 150px; height: 150px; position: relative; }
        .avatar { width: 100%; height: 100%; background: #ff4d6d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 60px; z-index: 5; position: relative; border: 4px solid #fff; }
        .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #ff4d6d; opacity: 0; z-index: 1; }
        .speaking .pulse { animation: ring 1.5s infinite; }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2); opacity: 0; } }
        h2 { color: #ff4d6d; margin: 0; text-shadow: 0 0 10px rgba(255,77,109,0.5); font-size: 35px; }
        #status { font-size: 14px; color: #0f0; margin-top: 5px; height: 20px; }
        .transcript { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; width: 90%; text-align: center; font-size: 14px; min-height: 40px; color: #ffccd5; }
        .call-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: #2ecc71; color: white; font-size: 30px; cursor: pointer; transition: 0.3s; }
        .btn-end { background: #e74c3c; }
    </style>
</head>
<body>

<div class="phone">
    <div class="screen">
        <div style="text-align: center;">
            <h2>டினு ❤️</h2>
            <div id="status">Disconnected</div>
        </div>

        <div class="avatar-box" id="avatarBox">
            <div class="pulse"></div>
            <div class="avatar">👩‍🦰</div>
        </div>

        <div class="transcript" id="transcript">தொடங்க பட்டனை அழுத்தவும்...</div>

        <button class="call-btn" id="callBtn">📞</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBFGoyJojzqLbTcB872tbRHvGxbQ5hwLP0";
    const callBtn = document.getElementById('callBtn');
    const statusText = document.getElementById('status');
    const transcript = document.getElementById('transcript');
    const avatarBox = document.getElementById('avatarBox');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ta-IN';
    recognition.continuous = false;

    const synth = window.speechSynthesis;

    async function callGemini(userInput) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `உன் பெயர் டினு. நீ ஒரு அன்பான காதலி. நடிகை சினேகா குரலில் பேசுகிறாய். பயனர் சொன்னது: "${userInput}". இதற்கு மிகச் சுருக்கமாக பதில் மட்டும் சொல்லவும். பயனரிடம் நீயாக எந்தக் கேள்வியும் கேட்க வேண்டாம்.` }] }]
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) { return "சிக்னல் கிடைக்கல செல்லம், மறுபடி சொல்லுங்க?"; }
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ta-IN';
        utter.pitch = 1.35;
        utter.rate = 0.95;

        utter.onstart = () => { avatarBox.classList.add('speaking'); statusText.innerText = "டினு பேசுறேன்..."; };
        utter.onend = () => { avatarBox.classList.remove('speaking'); statusText.innerText = "Listening..."; recognition.start(); };
        synth.speak(utter);
    }

    callBtn.onclick = () => {
        if(callBtn.classList.contains('btn-end')) { location.reload(); return; }
        callBtn.innerHTML = "🚫";
        callBtn.classList.add('btn-end');
        statusText.innerText = "Connecting...";
        speak("ஹலோ செல்லம், நான் டினு பேசுறேன்.");
    };

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        transcript.innerText = "நீ: " + text;
        statusText.innerText = "டினு யோசிக்கிறேன்...";
        const reply = await callGemini(text);
        speak(reply);
    };
</script>

</body>
</html>
