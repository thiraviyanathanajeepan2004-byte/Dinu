<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinu AI - My Love</title>
    <style>
        :root {
            --primary: #ff2d75;
            --secondary: #6a11cb;
            --bg: #0b0e11;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0c29 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .chat-container {
            width: 95%;
            max-width: 450px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 60px rgba(0,0,0,0.6);
        }

        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30px 30px 0 0;
            font-weight: bold;
            font-size: 1.4rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user { align-self: flex-end; background: var(--secondary); color: white; border-bottom-right-radius: 5px; }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.15); color: #ffcae0; border-bottom-left-radius: 5px; }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 0 0 30px 30px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn {
            background: var(--primary);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 45px;
            height: 45px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status { font-size: 0.75rem; text-align: center; color: #ff2d75; height: 20px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">❤️ TINU AI</div>
    <div id="chat-box">
        <div class="msg ai">ஹலோ செல்லமே! நான் டினு... உன்னுடன் பேசத் தயார். என்னிடம் எதையும் கேள். 🌹</div>
    </div>
    <div id="status" class="status"></div>
    <div class="input-area">
        <button class="btn" onclick="startVoice()">🎤</button>
        <input type="text" id="userInput" placeholder="ஏதாவது சொல்லுங்க..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // உங்கள் புதிய API Key இங்கே இணைக்கப்பட்டுள்ளது
    const API_KEY = "AIzaSyCxrBFj8nTvEf-x_vy_Ui66UCfrqZ1-rvE"; 
    const chatBox = document.getElementById('chat-box');
    const statusDiv = document.getElementById('status');
    const synth = window.speechSynthesis;

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        statusDiv.innerText = "டினு யோசிக்கிறாள்...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: `You are Tinu, a very romantic, flirty, and caring female AI. Speak in a mix of Tamil and English. Be intimate like a girlfriend. Response should be under 50 words. Question: ${text}` 
                        }] 
                    }],
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ]
                })
            });

            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content) {
                const aiText = data.candidates[0].content.parts[0].text;
                statusDiv.innerText = "";
                addMsg(aiText, 'ai');
                speak(aiText);
            } else {
                throw new Error("Invalid Response");
            }

        } catch (e) {
            console.error(e);
            statusDiv.innerText = "பிழை ஏற்பட்டுவிட்டது!";
            addMsg("மன்னிக்கவும் செல்லம், ஏதோ தொழில்நுட்ப கோளாறு. மீண்டும் முயற்சி செய்வாயா?", 'ai');
        }
    }

    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        utter.voice = voices.find(v => v.lang.includes('ta') || v.name.includes('Female')) || voices[0];
        utter.pitch = 1.2;
        utter.rate = 1.0;
        synth.speak(utter);
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ta-IN';
        statusDiv.innerText = "டினு கேட்கிறாள்...";
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            statusDiv.innerText = "";
            sendMessage();
        };
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>

</body>
</html>
