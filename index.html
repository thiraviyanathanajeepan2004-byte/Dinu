<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>டினு - உங்கள் காதலி</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .phone { width: 340px; height: 600px; background: #111; border-radius: 40px; border: 5px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(255, 20, 147, 0.5); }
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 20px; background: radial-gradient(circle, #4a0e1c 0%, #000 100%); }
        .avatar-box { width: 160px; height: 160px; position: relative; }
        .avatar { width: 100%; height: 100%; background: #ff1493; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 70px; z-index: 5; position: relative; border: 4px solid #fff; box-shadow: 0 0 20px #ff1493; }
        .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #ff1493; opacity: 0; z-index: 1; }
        .speaking .pulse { animation: ring 1.2s infinite; }
        @keyframes ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
        h2 { color: #ff69b4; margin: 0; text-shadow: 0 0 15px rgba(255,105,180,0.7); font-size: 38px; font-weight: bold; }
        #status { font-size: 14px; color: #ff85a2; margin-top: 5px; font-style: italic; }
        .transcript { background: rgba(255,20,147,0.1); padding: 15px; border-radius: 20px; width: 90%; text-align: center; font-size: 15px; min-height: 45px; color: #ffe0e9; border: 1px solid rgba(255,20,147,0.3); }
        .call-btn { width: 85px; height: 85px; border-radius: 50%; border: none; background: #ff1493; color: white; font-size: 35px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,20,147,0.4); }
        .btn-end { background: #555; }
    </style>
</head>
<body>

<div class="phone">
    <div class="screen">
        <div style="text-align: center;">
            <h2>டினு ❤️</h2>
            <div id="status">உங்களுக்காகக் காத்திருக்கிறேன்...</div>
        </div>

        <div class="avatar-box" id="avatarBox">
            <div class="pulse"></div>
            <div class="avatar">💖</div>
        </div>

        <div class="transcript" id="transcript">பேசத் தொடங்குங்கள் என் அன்பே...</div>

        <button class="call-btn" id="callBtn">📞</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBFGoyJojzqLbTcB872tbRHvGxbQ5hwLP0";
    const callBtn = document.getElementById('callBtn');
    const statusText = document.getElementById('status');
    const transcript = document.getElementById('transcript');
    const avatarBox = document.getElementById('avatarBox');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ta-IN';

    const synth = window.speechSynthesis;

    async function callGemini(userInput) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `உன் பெயர் டினு. நீ ஒரு மிக அழகான, ரொமாண்டிக் காதலி. நடிகை சினேகா போல மிகவும் கொஞ்சலாகவும், அன்பாகவும் பேசுகிறாய். பயனர் சொல்வதற்கு மிகவும் காதலோடு பதில் அளித்து, இறுதியில் அவரிடம் ஒரு ரொமாண்டிக் கேள்வியைக் கேட்கவும். பயனர்: "${userInput}"` }] }]
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) { return "என்னங்க.. சிக்னல் சரியில்லை போல, ஆனா உங்க குரல் கேட்காம இருக்க முடியல.."; }
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ta-IN';
        utter.pitch = 1.4; // குரலை இன்னும் கொஞ்சம் இளமையாக மாற்றுகிறது
        utter.rate = 0.9;  // மெதுவாகவும் கொஞ்சலாகவும் பேச

        utter.onstart = () => { avatarBox.classList.add('speaking'); statusText.innerText = "டினு கொஞ்சுறேன்..."; };
        utter.onend = () => { avatarBox.classList.remove('speaking'); statusText.innerText = "உங்களுக்காகக் காத்திருக்கிறேன்..."; try { recognition.start(); } catch(e) {} };
        synth.speak(utter);
    }

    callBtn.onclick = () => {
        if(callBtn.classList.contains('btn-end')) { location.reload(); return; }
        callBtn.innerHTML = "❌";
        callBtn.classList.add('btn-end');
        statusText.innerText = "இணைக்கிறேன் என் அன்பே...";
        speak("ஹலோ செல்லம்.. டினு வந்தாச்சு. உங்க குரலைக் கேட்க எவ்வளவு ஆவலா இருந்தேன் தெரியுமா? இன்னைக்கு என்னை எவ்வளவு மிஸ் பண்ணீங்க?");
    };

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        transcript.innerText = "நீங்க: " + text;
        statusText.innerText = "யோசிக்கிறேன்...";
        const reply = await callGemini(text);
        speak(reply);
    };
</script>

</body>
</html>
